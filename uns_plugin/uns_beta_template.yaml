name: uns_beta
type: input
status: experimental
summary: Preview of the reliable UNS input; will replace `uns`.
description: |
  uns_beta delegates to the official redpanda Connect input via a UMH core
  input (uns_beta_reader) so that NACKed batches are never committed away. It
  pins auto_replay_nacks: true (the ENG-5094 NACK-replay guarantee) and the
  OOM-tuned fetch limits, and filters delivered records by the umh_topics key
  regex.

  This template owns the lean 4-field user surface; it synthesizes the nested
  redpanda config. Each normalized scalar is computed once and written to both
  the nested redpanda block and the top-level uns_beta_reader fields, so for
  template-produced configs they match by construction; uns_beta_reader then
  validates the top-level copy.

fields:
  - name: broker_address
    description: 'Kafka broker address to connect to. A single address or multiple addresses separated by commas. For example: "localhost:9092" or "broker1:9092,broker2:9092".'
    type: string

  - name: consumer_group
    description: Consumer group used when consuming the configured Kafka topic.
    type: string

  - name: kafka_topic
    description: The Kafka topic to consume.
    type: string
    default: umh.messages
    advanced: true

  - name: umh_topics
    description: List of RE2 regex patterns matched against each record's Kafka key (the umh_topic). Only records whose key matches at least one pattern are delivered; records with an empty or absent key never match any pattern. Patterns are unanchored; use ^...$ to match the full key. Defaults to a single match-everything pattern.
    type: string
    kind: list
    default: [".*"]
    advanced: true

mapping: |
  #!blobl
  # Normalize each value exactly ONCE, then reference it in both the nested
  # redpanda block and the top-level uns_beta_reader fields. For configs this
  # template produces, the two copies match by construction (single
  # computation), so the value Go validates is the value redpanda receives. The
  # reader is a Deprecated raw surface that validates only the top-level copy;
  # the render/parity tests guard the equality, Go does not.
  #
  # $brokers reproduces the old splitBrokerAddress: comma-split, trim each, drop
  # empties (a trailing comma must not produce an empty seed_brokers element).
  # redpanda's own comma-expansion does NOT trim or drop, so the template must.
  let brokers = this.broker_address.split(",").map_each(b -> b.trim()).filter(b -> b != "")
  let group = this.consumer_group.trim()
  let topic = this.kafka_topic.trim()

  root.uns_beta_reader.input.redpanda.seed_brokers = $brokers
  root.uns_beta_reader.input.redpanda.topics = [ $topic ]
  root.uns_beta_reader.input.redpanda.consumer_group = $group
  # start_offset and commit_period match redpanda's current defaults; pinned
  # deliberately so an upstream default change cannot alter uns_beta's
  # first-connect behavior or commit cadence.
  root.uns_beta_reader.input.redpanda.start_offset = "earliest"
  root.uns_beta_reader.input.redpanda.commit_period = "5s"
  # OOM-tuned fetch limits — mirror the defaultFetch* constants in
  # uns_input_config.go ("Reduced from 100MB to prevent OOM kills"). These are
  # upstream STRING fields (NewStringField/NewDurationField, parsed via
  # BytesFromStrFieldAsInt32), so they MUST be quoted string literals here — a
  # bare YAML int fails/coerces against a string field. This is bloblang YAML,
  # so these literals cannot reference the Go constants directly; instead the
  # render test (uns_beta_input_test.go) re-derives the same five fetch/conn
  # values FROM the constants and asserts equality. That test, not the template,
  # is what makes a constant retune fail loudly.
  root.uns_beta_reader.input.redpanda.fetch_max_bytes = "10000000"
  root.uns_beta_reader.input.redpanda.fetch_max_partition_bytes = "10000000"
  root.uns_beta_reader.input.redpanda.fetch_min_bytes = "1000000"
  root.uns_beta_reader.input.redpanda.fetch_max_wait = "1s"
  root.uns_beta_reader.input.redpanda.conn_idle_timeout = "15m0s"
  # auto_replay_nacks also matches the upstream default, but it is pinned for a
  # stronger reason: it IS the ENG-5094 NACK-replay guarantee — never drop it
  # even if it stays identical to the default.
  root.uns_beta_reader.input.redpanda.auto_replay_nacks = true

  # The same normalized scalars as top-level reader fields (validation-only) and
  # the umh_topics passthrough.
  root.uns_beta_reader.umh_topics = this.umh_topics
  root.uns_beta_reader.seed_brokers = $brokers
  root.uns_beta_reader.consumer_group = $group
  root.uns_beta_reader.kafka_topic = $topic
