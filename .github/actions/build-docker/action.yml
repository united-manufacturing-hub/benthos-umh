---
name: Build and Push Docker Image
description: Builds the benthos-umh multi-arch Docker image with Depot and pushes it to ghcr.io with semver, branch, PR, and sha tags.

inputs:
  registry:
    description: Container registry
    required: false
    default: ghcr.io
  image-name:
    description: Image name (owner/repo)
    required: true
  github-token:
    description: Token used to log in to the container registry
    required: true
  depot-project-id:
    description: Depot project ID
    required: true
  depot-token:
    description: Depot API token
    required: true

outputs:
  tags:
    description: Newline-separated docker tags applied to the pushed image
    value: ${{ steps.meta.outputs.tags }}
  version:
    description: Primary version tag chosen by metadata-action
    value: ${{ steps.meta.outputs.version }}

runs:
  using: composite
  steps:
    - name: Setup Depot
      uses: depot/setup-action@b0b1ea4f69e92ebf5dea3f8713a1b0c37b2126a5 # v1

    - name: Login to GitHub Container Registry
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
      with:
        images: |
          ${{ inputs.registry }}/${{ inputs.image-name }}
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern=latest,include_prereleases=false
          type=ref,event=branch
          type=ref,event=pr
          type=sha

    - name: Build and Push Docker Image
      uses: depot/build-push-action@9785b135c3c76c33db102e45be96a25ab55cd507 # v1
      with:
        project: ${{ inputs.depot-project-id }}
        token: ${{ inputs.depot-token }}
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          APP_VERSION=${{ steps.meta.outputs.version }}
        provenance: false
        file: ./Dockerfile
