---
name: main

on:
  push:
    branches: [main, staging]
  pull_request:

jobs:
  build-docker:
    permissions:
      packages: write
      contents: read
    timeout-minutes: 60
    runs-on: depot-ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build and Push Docker Image
        uses: ./.github/actions/build-docker
        with:
          image-name: ${{ github.repository }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          depot-project-id: ${{ secrets.DEPOT_PROJECT_ID }}
          depot-token: ${{ secrets.DEPOT_TOKEN }}

  comment-pr:
    name: Comment PR with Image Tag
    needs: build-docker
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Compute short SHA
        id: short-sha
        run: echo "SHORT_SHA=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Comment image tag on PR
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: docker-image
          message: |
            **Docker Image Built**

            ```
            ghcr.io/united-manufacturing-hub/benthos-umh:sha-${{ steps.short-sha.outputs.SHORT_SHA }}
            ```

            Pull with:
            ```bash
            docker pull ghcr.io/united-manufacturing-hub/benthos-umh:sha-${{ steps.short-sha.outputs.SHORT_SHA }}
            ```
