---
name: Changelog

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  generate-changelog:
    if: startsWith(github.event.pull_request.title, 'v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Extract version from PR title
        run: echo "VERSION=${{ github.event.pull_request.title }}" >> "$GITHUB_ENV"

      - name: Batch and merge changelog
        run: make changelog-merge VERSION="$VERSION"

      - name: Commit changelog
        uses: stefanzweifel/git-auto-commit-action@f53a62c26ed5971dd2ed8768e4142f08c767ea37 # v7
        with:
          commit_message: "chore: generate changelog for ${{ env.VERSION }}"
          file_pattern: ".changelog/ CHANGELOG.md"
