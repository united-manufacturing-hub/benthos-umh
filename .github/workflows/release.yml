---
name: Release

on:
  push:
    tags: [v*]

jobs:
  build-docker:
    permissions:
      packages: write
      contents: read
    timeout-minutes: 60
    runs-on: depot-ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build and Push Docker Image
        uses: ./.github/actions/build-docker
        with:
          image-name: ${{ github.repository }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          depot-project-id: ${{ secrets.DEPOT_PROJECT_ID }}
          depot-token: ${{ secrets.DEPOT_TOKEN }}

  build-binaries:
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    runs-on: depot-ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Set up Build Environment
        run: |
          VERSION="${{ github.ref_name }}"
          echo "GOOS=${{ matrix.goos }}" >> $GITHUB_ENV
          echo "GOARCH=${{ matrix.goarch }}" >> $GITHUB_ENV
          echo "APP_VERSION=${VERSION#v}" >> $GITHUB_ENV

          if [ "${{ matrix.goos }}" == "windows" ]; then
            FILE_EXTENSION=".exe"
          else
            FILE_EXTENSION=""
          fi

          echo "OUTPUT_NAME=benthos-${{ matrix.goos }}-${{ matrix.goarch }}${FILE_EXTENSION}" >> $GITHUB_ENV

      - name: Build Binary
        run: |
          mkdir -p ./dist
          GOOS=${{ env.GOOS }} GOARCH=${{ env.GOARCH }} \
            CGO_ENABLED=0 GOPROXY=https://golangproxy.umh.app,https://proxy.golang.org,direct \
            go build \
            -ldflags "-s -w \
            -X github.com/redpanda-data/benthos/v4/internal/cli.Version=${{ env.APP_VERSION }} \
            -X github.com/redpanda-data/benthos/v4/internal/cli.DateBuilt=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o ./dist/${{ env.OUTPUT_NAME }} \
            cmd/benthos/main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifact-${{ matrix.goos }}-${{ matrix.goarch }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ./dist/${{ env.OUTPUT_NAME }}

  release:
    needs: build-binaries
    if: needs.build-binaries.result == 'success'
    permissions:
      contents: write
    runs-on: depot-ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Extract release notes
        run: |
          BODY=$(make changelog-diff)
          {
            echo "RELEASE_BODY<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: "artifact-*-${{ github.run_id }}-${{ github.run_attempt }}"
          path: ./artifacts

      - name: Create or Update Release
        uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b # v1.20.0
        with:
          tag: ${{ github.ref_name }}
          artifacts: "./artifacts/artifact-*-${{ github.run_id }}-${{ github.run_attempt }}/*"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          omitBodyDuringUpdate: true
          body: ${{ env.RELEASE_BODY }}
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}

  update-umh-core:
    needs: release
    if: needs.release.result == 'success'
    uses: ./.github/workflows/update-umh-core-version.yml
    with:
      tag: ${{ github.ref_name }}
    secrets: inherit
