kind: new
body: TimescaleDB Historian output that saves a UNS data contract into TimescaleDB under a dedicated umh schema. The bridge fails at startup when the target database is unreachable or misconfigured, rather than writing to a misconfigured database unnoticed. By default every metadata key is stored; `metadata_keys_exclude` drops selected keys by exact name or `prefix_*` while keeping the rest (ENG-5181)
